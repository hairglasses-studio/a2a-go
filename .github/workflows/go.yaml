# This workflow will build a golang project
# For more information see: 
# - https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
# - https://golangci-lint.run/usage/configuration/

name: Go

on:
  push:
    branches: [ "main", "release/**" ]

  pull_request:
    branches: [ "main", "release/**" ]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, archglasses, optimized]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup
      uses: ./.github/actions/setup

    - name: Tidy
      run: go mod tidy -diff
      
    - name: Build
      run: go build -mod=readonly -v ./...

    - name: Build example modules
      run: |
        for dir in $(find examples -name go.mod -exec dirname {} \;); do
          echo "Building $dir"
          (cd "$dir" && go build ./...)
        done

    - name: Test
      run: go test -race -mod=readonly -v -count=1 -shuffle=on ./...

  lint:
    runs-on: [self-hosted, archglasses, optimized]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup
      uses: ./.github/actions/setup

    - name: Lint
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
      with:
        install-mode: goinstall
        version: 5256574b81bcedfbcae9099f745f6aee9335da10 # v2.3.1